name: RSS Collection

on:
  schedule:
    - cron: '17 2,14 * * *'
  workflow_dispatch:

concurrency:
  group: content-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Collect RSS feeds
        run: bun run scripts/rss-collect.ts

      - name: Validate collected content
        run: bun run validate

      - name: Configure git
        run: |
          git config user.name "honeycombo-bot"
          git config user.email "bot@honeycombo.pages.dev"

      - name: Create PR with new articles
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          git add src/data/feeds/
          if git diff --cached --quiet; then
            echo "No new articles to commit"
            exit 0
          fi

          BRANCH="auto/rss-feeds"
          git checkout -B "$BRANCH"
          git commit -m "chore: update RSS feed articles"
          git push origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: update RSS feed articles" \
              --body "Automated RSS feed collection." \
              --base master \
              --head "$BRANCH"
          fi
          gh pr merge "$BRANCH" --auto --squash
