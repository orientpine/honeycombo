name: RSS Collection

on:
  schedule:
    - cron: '17 2,14 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
concurrency:
  group: content-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Collect RSS feeds
        run: bun run scripts/rss-collect.ts

      - name: Validate collected content
        run: bun run validate

      - name: Configure git
        run: |
          git config user.name "honeycombo-bot"
          git config user.email "bot@honeycombo.pages.dev"

      - name: Commit and push new articles
        run: |
          git add src/data/feeds/
          if git diff --cached --quiet; then
            echo "No new articles to commit"
            exit 0
          fi

          git commit -m "chore: update RSS feed articles [skip ci]"

          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            git pull --rebase origin master || true
            if git push origin master; then
              echo "Push succeeded"
              exit 0
            fi
            RETRY=$((RETRY + 1))
            sleep 5
          done

          echo "Push failed after $MAX_RETRIES retries"
          exit 1
