name: Auto-Label Submission Issues

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.issue.labels.*.name, 'submission')
      && (contains(github.event.issue.body, '### URL')
          || contains(github.event.issue.body, '### 링크 목록'))
    permissions:
      issues: write
    steps:
      - name: Apply submission labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          IS_BULK: ${{ contains(github.event.issue.body, '### 링크 목록') }}
        run: |
          if [ "$IS_BULK" = "true" ]; then
            gh issue edit "$ISSUE_NUM" --add-label "submission,bulk" --repo "$REPO"
            echo "Applied labels: submission, bulk"
          else
            gh issue edit "$ISSUE_NUM" --add-label "submission" --repo "$REPO"
            echo "Applied label: submission"
          fi
