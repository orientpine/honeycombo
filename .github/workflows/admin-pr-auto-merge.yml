name: Admin PR Auto-Merge

# PR 작성자가 src/config/editors.json에 등록된 관리자(editor)이면,
# PR 생성 직후 자동으로 auto-merge를 켜서 CI 통과 즉시 squash merge 되도록 한다.
#
# 보완 관계:
#   - .github/workflows/process-submission.yml: issue 기반 bot PR(submission/*) 담당
#   - 이 워크플로우: 관리자가 직접 푸시한 코드/문서/설정 PR 담당
#
# 참고 문서: docs/features/admin-pr-auto-merge.md

on:
  pull_request:
    types: [opened, ready_for_review]

concurrency:
  group: admin-pr-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    # 아래 조건을 모두 만족할 때만 auto-merge 활성화 시도:
    #   1) 같은 저장소의 브랜치에서 온 PR (fork 아님 — GITHUB_TOKEN 권한 제약)
    #   2) PR 작성자가 봇이 아닌 사람 계정 (Dependabot 등 기본 제외)
    #   3) draft 상태가 아님 (gh가 draft에 --auto 거부. ready_for_review 전환 시 재실행됨)
    #   4) submission/* 브랜치가 아님 (process-submission.yml이 이미 처리)
    #   5) submission 라벨이 붙지 않음 (위와 동일 이유)
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.user.type == 'User'
      && github.event.pull_request.draft == false
      && !startsWith(github.event.pull_request.head.ref, 'submission/')
      && !contains(github.event.pull_request.labels.*.name, 'submission')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check if PR author is an editor
        id: check_editor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_AUTHOR_ID: ${{ github.event.pull_request.user.id }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          # base 브랜치(= master)의 editors.json을 읽는다.
          # PR head 브랜치를 읽으면 PR 작성자가 editors.json 자체를 고쳐
          # 자기 자신을 등록하는 공격 벡터가 생기므로 금지.
          EDITORS_JSON=$(gh api \
            "repos/$REPO/contents/src/config/editors.json?ref=$BASE_REF" \
            --jq '.content' | base64 -d)

          IDS=$(echo "$EDITORS_JSON" | jq -r '.editor_github_ids[]')

          if echo "$IDS" | grep -qx "$PR_AUTHOR_ID"; then
            echo "is_editor=true" >> "$GITHUB_OUTPUT"
            echo "Editor detected: login=$PR_AUTHOR_LOGIN id=$PR_AUTHOR_ID"
          else
            echo "is_editor=false" >> "$GITHUB_OUTPUT"
            echo "Not an editor: login=$PR_AUTHOR_LOGIN id=$PR_AUTHOR_ID — skipping"
          fi

      - name: Enable auto-merge (squash)
        if: steps.check_editor.outputs.is_editor == 'true'
        env:
          # GITHUB_TOKEN은 enablePullRequestAutoMerge GraphQL mutation에 대해
          # "Resource not accessible by integration" 오류를 반환한다.
          # process-submission.yml도 동일한 이유로 secrets.PAT를 사용한다.
          GH_TOKEN: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash \
            --delete-branch
          echo "Auto-merge enabled on PR #$PR_NUMBER (squash, delete branch)"
