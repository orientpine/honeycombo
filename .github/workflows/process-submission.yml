name: Process Submission

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

concurrency:
  group: content-update
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.issue.labels.*.name, 'submission')
      || (github.event.action == 'opened'
          && (contains(github.event.issue.body, '### URL')
              || contains(github.event.issue.body, '### Link List')
              || contains(github.event.issue.body, '### 링크 목록')))
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Auto-label if needed
        if: github.event_name == 'issues' && !contains(github.event.issue.labels.*.name, 'submission')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          IS_BULK: ${{ contains(github.event.issue.body, '### Link List') || contains(github.event.issue.body, '### 링크 목록') }}
        run: |
          if [ "$IS_BULK" = "true" ]; then
            gh issue edit "$ISSUE_NUM" --add-label "submission,bulk" --repo "$REPO"
            echo "AUTO_LABELS=submission,bulk" >> $GITHUB_ENV
          else
            gh issue edit "$ISSUE_NUM" --add-label "submission" --repo "$REPO"
            echo "AUTO_LABELS=submission" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve issue payload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER_INPUT: ${{ github.event.inputs.issue_number }}
          ISSUE_NUMBER_EVENT: ${{ github.event.issue.number }}
          ISSUE_LABELS_EVENT: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_TITLE_EVENT: ${{ github.event.issue.title }}
          ISSUE_BODY_EVENT: ${{ github.event.issue.body }}
          ISSUE_USER_EVENT: ${{ github.event.issue.user.login }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ISSUE_JSON=$(gh api repos/$REPOSITORY/issues/$ISSUE_NUMBER_INPUT)
            ISSUE_USER=$(echo "$ISSUE_JSON" | jq -r '.user.login')
            ISSUE_USER_ID=$(echo "$ISSUE_JSON" | jq -r '.user.id')
            LABELS=$(echo "$ISSUE_JSON" | jq -r '[.labels[].name] | join(",")')
            echo "ISSUE_NUMBER=$ISSUE_NUMBER_INPUT" >> $GITHUB_ENV
            echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
            echo "$ISSUE_JSON" | jq -r '.title' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
            echo "$ISSUE_JSON" | jq -r '.body' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "ISSUE_USER=$ISSUE_USER" >> $GITHUB_ENV
            echo "ISSUE_USER_ID=$ISSUE_USER_ID" >> $GITHUB_ENV
            echo "ISSUE_LABELS=$LABELS" >> $GITHUB_ENV
          else
            echo "ISSUE_NUMBER=$ISSUE_NUMBER_EVENT" >> $GITHUB_ENV
            echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
            echo "$ISSUE_TITLE_EVENT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
            echo "$ISSUE_BODY_EVENT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "ISSUE_USER=$ISSUE_USER_EVENT" >> $GITHUB_ENV
            echo "ISSUE_USER_ID=${{ github.event.issue.user.id }}" >> $GITHUB_ENV
            if [ -n "$AUTO_LABELS" ]; then
              echo "ISSUE_LABELS=$AUTO_LABELS" >> $GITHUB_ENV
            else
              echo "ISSUE_LABELS=$ISSUE_LABELS_EVENT" >> $GITHUB_ENV
            fi
          fi

      - name: Process submission
        env:
          ISSUE_LABELS: ${{ env.ISSUE_LABELS }}
          ISSUE_USER_ID: ${{ env.ISSUE_USER_ID }}
        run: bun run scripts/process-submission.ts

      - name: Report bulk submission results (upsert comment)
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          if [ ! -f bulk-result.json ]; then
            echo 'No bulk-result.json; skipping bulk report step.'
            exit 0
          fi

          TOTAL=$(jq -r '.total' bulk-result.json)
          if [ "$TOTAL" = '0' ] || [ -z "$TOTAL" ]; then
            echo 'Empty bulk-result; nothing to report.'
            exit 0
          fi

          SUCCEEDED=$(jq -r '.succeeded | length' bulk-result.json)
          FAILED=$(jq -r '.failed | length' bulk-result.json)
          MARKER='<!-- honeycombo-bulk-result -->'

          {
            echo "$MARKER"
            echo
            if [ "$FAILED" = '0' ]; then
              echo "## ✅ 대량 제출 처리 결과"
            else
              echo "## ⚠️ 대량 제출 처리 결과 (일부 실패)"
            fi
            echo
            echo "- 성공: $SUCCEEDED / $TOTAL"
            echo "- 실패: $FAILED / $TOTAL"
            if [ "$FAILED" -gt 0 ]; then
              echo
              echo '### ❌ 실패 항목'
              echo
              echo '| URL | 사유 |'
              echo '|---|---|'
              jq -r '.failed[] | "| \(.url) | \(.reason) |"' bulk-result.json
            fi
          } > /tmp/bulk-comment.md

          # Upsert: patch existing marked comment if present, else create new.
          EXISTING_ID=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$MARKER\"))] | .[0].id // empty")

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing comment #$EXISTING_ID"
            gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING_ID" \
              --field body=@/tmp/bulk-comment.md >/dev/null
          else
            echo 'Creating new bulk-result comment'
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file /tmp/bulk-comment.md
          fi

      - name: Validate generated content
        run: bun run validate

      - name: Configure git
        run: |
          git config user.name "honeycombo-bot"
          git config user.email "bot@honeycombo.pages.dev"

      - name: Create PR with new submission
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          ISSUE_NUM="$ISSUE_NUMBER"
          BRANCH="submission/$ISSUE_NUM"
          PR_TITLE="Submission from issue #$ISSUE_NUM"

          if echo ",$ISSUE_LABELS," | grep -q ',bulk,'; then
            PR_TITLE="Bulk submission from issue #$ISSUE_NUM"
          fi

          git checkout -b "$BRANCH"
          git add src/content/curated/

          if git diff --cached --quiet; then
            echo "No new files to commit"
            exit 0
          fi

          git commit -m "feat: add submission from issue #$ISSUE_NUM"

          # stale 원격 브랜치 방어:
          #   이전 run이 같은 issue에 대해 submission/$ISSUE_NUM 브랜치를 만들고
          #   PR이 이미 닫힌(merged/closed) 상태라면 origin 브랜치를 정리한다.
          #   열린 PR이 있으면 브랜치를 건드리지 않는다 (PR이 사라지면 안 됨).
          # 경쟁 상태는 --force-with-lease가 감지한다.
          OPEN_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // ""')
          if [ -z "$OPEN_PR" ]; then
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "Removing stale remote branch $BRANCH (no open PR)"
              git push origin --delete "$BRANCH" || true
            fi
          fi

          # 이번 run에서 아직 원격 브랜치를 fetch한 적이 없으면 --force-with-lease가
          # 비어 있는 expected value로 실패할 수 있다. 현 원격 tip을 먼저 가져와서
          # --force-with-lease가 "내가 방금 본 상태" 대비 비교하도록 한다.
          git fetch origin "$BRANCH" || true
          git push --force-with-lease origin "$BRANCH"

          if [ -n "$OPEN_PR" ]; then
            echo "Reusing existing open PR #$OPEN_PR on branch $BRANCH"
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body "Closes #$ISSUE_NUM. Auto-generated submission." \
              --base master \
              --head "$BRANCH" \
              --label "submission"
          fi

      - name: Auto-merge if editor
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          ISSUE_USER_ID: ${{ env.ISSUE_USER_ID }}
        run: |
          # Read editor list from config
          EDITOR_IDS=$(jq -r '.editor_github_ids[]' src/config/editors.json 2>/dev/null || true)
          IS_EDITOR=false
          for eid in $EDITOR_IDS; do
            if [ "$eid" = "$ISSUE_USER_ID" ]; then
              IS_EDITOR=true
              break
            fi
          done

          if [ "$IS_EDITOR" = "true" ]; then
            ISSUE_NUM="$ISSUE_NUMBER"
            BRANCH="submission/$ISSUE_NUM"
            echo "Editor detected (ID: $ISSUE_USER_ID) — auto-merging PR"
            PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')
            if [ -n "$PR_URL" ]; then
              gh pr merge "$PR_URL" --merge --auto
              echo "IS_EDITOR=true" >> $GITHUB_ENV
            fi
          else
            echo "IS_EDITOR=false" >> $GITHUB_ENV
          fi

      - name: Comment on issue (generic success)
        if: success() && github.event_name == 'issues' && env.IS_EDITOR != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Suppress the generic success comment when a bulk submission had
          # failures — the "Report bulk submission results" step already posted
          # a detailed comment covering that case.
          if [ -f bulk-result.json ]; then
            FAILED=$(jq -r '.failed | length' bulk-result.json)
            if [ "$FAILED" != '0' ] && [ -n "$FAILED" ]; then
              echo 'Bulk had failures — skipping generic success comment (detailed comment was posted).'
              exit 0
            fi
          fi
          gh issue comment $ISSUE_NUMBER \
            --body "✅ 제출이 접수되었습니다. 검토 후 게시됩니다."

      - name: Comment on failure
        if: failure() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment $ISSUE_NUMBER \
            --body "❌ 제출 처리 중 오류가 발생했습니다. 입력 내용을 확인해주세요."
