name: Article Summarization

on:
  schedule:
    - cron: '47 3,15 * * *'
  workflow_dispatch:

concurrency:
  group: content-update
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Summarize articles without descriptions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun run scripts/summarize-articles.ts

      - name: Validate updated content
        run: bun run validate

      - name: Configure git
        run: |
          git config user.name "honeycombo-bot"
          git config user.email "bot@honeycombo.pages.dev"

      - name: Create PR with summaries
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          git add src/content/curated/ src/data/feeds/
          if git diff --cached --quiet; then
            echo "No new summaries to commit"
            exit 0
          fi

          BRANCH="auto/summarize"
          git checkout -B "$BRANCH"
          git commit -m "chore: add AI-generated article summaries"
          git push origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: add AI-generated article summaries" \
              --body "Automated article summarization." \
              --base master \
              --head "$BRANCH"
          fi
          gh pr merge "$BRANCH" --auto --squash
