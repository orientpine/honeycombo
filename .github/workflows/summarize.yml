name: Article Summarization

on:
  schedule:
    - cron: '47 3,15 * * *'
  workflow_dispatch:

concurrency:
  group: content-update
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Summarize articles without descriptions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun run scripts/summarize-articles.ts

      - name: Validate updated content
        run: bun run validate

      - name: Configure git
        run: |
          git config user.name "honeycombo-bot"
          git config user.email "bot@honeycombo.pages.dev"

      - name: Commit and push summaries
        run: |
          git add src/content/curated/ src/data/feeds/
          if git diff --cached --quiet; then
            echo "No new summaries to commit"
            exit 0
          fi

          git commit -m "chore: add AI-generated article summaries [skip ci]"

          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            git pull --rebase origin master || true
            if git push origin master; then
              echo "Push succeeded"
              exit 0
            fi
            RETRY=$((RETRY + 1))
            sleep 5
          done

          echo "Push failed after $MAX_RETRIES retries"
          exit 1
