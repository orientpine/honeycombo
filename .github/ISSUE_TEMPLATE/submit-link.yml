name: 📎 자료 등록
description: 뉴스, 아티클, YouTube 링크를 등록합니다
labels: ["submission"]
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: 등록할 링크를 입력하세요 (Enter the URL to submit)
      placeholder: "https://example.com/article 또는 https://youtube.com/watch?v=..."
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: 콘텐츠 유형을 선택하세요
      options:
        - Article
        - YouTube
        - X Thread
        - Threads
        - Other
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags (comma-separated, max 5)
      description: 관련 태그를 영어로 입력하세요 (Enter tags in English)
      placeholder: "AI, LLM, startup"

  - type: textarea
    id: note
    attributes:
      label: Short Description
      description: 이 자료를 추천하는 이유를 영어로 간단히 설명해주세요 (Write in English)
      placeholder: "A practical guide to building AI agents for production use cases"
      render: text
