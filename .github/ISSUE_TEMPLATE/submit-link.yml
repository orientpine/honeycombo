name: 📎 자료 등록
description: 뉴스, 아티클, YouTube 링크를 등록합니다
labels: ["submission"]
body:
  - type: input
    id: url
    attributes:
      label: URL
      description: 등록할 링크를 입력하세요 (Enter the URL to submit)
      placeholder: "https://example.com/article 또는 https://youtube.com/watch?v=..."
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: 콘텐츠 유형을 선택하세요
      options:
        - Article
        - YouTube
        - X Thread
        - Threads
        - Other
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags (comma-separated, max 5)
      description: 관련 태그를 영어로 입력하세요 (Enter tags in English)
      placeholder: "AI, LLM, startup"

  - type: textarea
    id: note
    attributes:
      label: Summary
      description: 이 자료의 핵심 내용을 한국어로 요약해주세요 (Summarize in Korean)
      placeholder: |
        ## 개요
        AI 에이전트 활용에 대한 실전 가이드...
        ## 주요 내용
        - 핵심 포인트 1
        - 핵심 포인트 2
        ## 시사점
        실무에서 바로 적용 가능한...
