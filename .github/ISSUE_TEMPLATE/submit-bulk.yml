name: 📦 대량 자료 등록
description: 여러 링크를 한꺼번에 등록합니다
labels: ["submission", "bulk"]
body:
  - type: textarea
    id: items
    attributes:
      label: Link List
      description: |
        한 줄에 하나씩 입력하세요. 태그와 설명은 영어로 작성해주세요.
        Format: URL | Type | tags (English, comma-separated) | short description (English)
        Type options: Article, YouTube, X Thread, Threads, Other
      placeholder: |
        https://example.com/article | Article | AI, LLM | Great analysis of AI agents
        https://youtube.com/watch?v=abc | YouTube | tutorial | Practical AI tutorial for developers
    validations:
      required: true
